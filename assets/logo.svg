<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 52) rotate(32) scale(280 220)">
      <stop stop-color="#FFE0F0"/>
      <stop offset="1" stop-color="#FFE0F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 118) rotate(26) scale(260 220)">
      <stop stop-color="#D4E4FF"/>
      <stop offset="1" stop-color="#D4E4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(632 370) rotate(180) scale(320 180)">
      <stop stop-color="#E0D4FF"/>
      <stop offset="1" stop-color="#E0D4FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardStroke" x1="144" y1="80" x2="1056" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#DAD7FF" stop-opacity="0.48"/>
    </linearGradient>
    <linearGradient id="orbFill" x1="160" y1="120" x2="330" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF7FF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#E8DDFF" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="360" y1="244" x2="732" y2="244" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <filter id="shadow" x="46" y="48" width="1108" height="332" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F0F14" flood-opacity="0.10"/>
    </filter>
    <filter id="softBlur" x="101" y="104" width="260" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="orbShadow" x="119" y="94" width="226" height="226" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#8B5CF6" flood-opacity="0.18"/>
    </filter>
    <mask id="crescentMask">
      <rect width="1200" height="420" fill="black"/>
      <circle cx="236" cy="210" r="48" fill="white"/>
      <circle cx="255" cy="196" r="46" fill="black"/>
    </mask>
  </defs>

  <rect width="1200" height="420" fill="#FAFAFF"/>
  <rect width="1200" height="420" fill="url(#bgA)"/>
  <rect width="1200" height="420" fill="url(#bgB)"/>
  <rect width="1200" height="420" fill="url(#bgC)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="72" width="1040" height="276" rx="36" fill="white" fill-opacity="0.62"/>
    <rect x="80.75" y="72.75" width="1038.5" height="274.5" rx="35.25" stroke="url(#cardStroke)" stroke-width="1.5"/>
    <rect x="81" y="73" width="1038" height="72" rx="36" fill="white" fill-opacity="0.18"/>
  </g>

  <g filter="url(#softBlur)" opacity="0.6">
    <circle cx="222" cy="220" r="80" fill="#C4B5FD"/>
    <circle cx="266" cy="170" r="46" fill="#FFE0F0"/>
  </g>

  <g filter="url(#orbShadow)">
    <circle cx="236" cy="210" r="74" fill="url(#orbFill)"/>
    <circle cx="236" cy="210" r="73.25" stroke="white" stroke-opacity="0.78" stroke-width="1.5"/>
  </g>

  <circle cx="236" cy="210" r="48" fill="#8B5CF6" fill-opacity="0.92" mask="url(#crescentMask)"/>
  <circle cx="282" cy="162" r="5.5" fill="#8B5CF6" fill-opacity="0.65"/>
  <circle cx="296" cy="188" r="3.5" fill="#C4B5FD" fill-opacity="0.95"/>
  <circle cx="182" cy="164" r="4" fill="#D4E4FF" fill-opacity="0.95"/>

  <text x="360" y="192" fill="#0F0F14" font-size="88" font-weight="600" letter-spacing="-3" font-family="'PP Neue Montreal', Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">curfew</text>
  <text x="362" y="236" fill="#5A5A68" font-size="28" font-weight="500" letter-spacing="-0.4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Protect your quiet hours from risky terminal commands.</text>
  <rect x="362" y="252" width="342" height="3" rx="1.5" fill="url(#accentLine)"/>

  <g>
    <rect x="362" y="278" width="118" height="38" rx="19" fill="white" fill-opacity="0.72"/>
    <rect x="362.75" y="278.75" width="116.5" height="36.5" rx="18.25" stroke="#E7E2FF" stroke-width="1.5"/>
    <text x="421" y="302" text-anchor="middle" fill="#0F0F14" font-size="17" font-weight="600" font-family="Inter, ui-sans-serif, system-ui, sans-serif">local-first</text>
  </g>
  <g>
    <rect x="492" y="278" width="118" height="38" rx="19" fill="white" fill-opacity="0.72"/>
    <rect x="492.75" y="278.75" width="116.5" height="36.5" rx="18.25" stroke="#E7E2FF" stroke-width="1.5"/>
    <text x="551" y="302" text-anchor="middle" fill="#0F0F14" font-size="17" font-weight="600" font-family="Inter, ui-sans-serif, system-ui, sans-serif">shell hooks</text>
  </g>
  <g>
    <rect x="622" y="278" width="124" height="38" rx="19" fill="white" fill-opacity="0.72"/>
    <rect x="622.75" y="278.75" width="122.5" height="36.5" rx="18.25" stroke="#E7E2FF" stroke-width="1.5"/>
    <text x="684" y="302" text-anchor="middle" fill="#0F0F14" font-size="17" font-weight="600" font-family="Inter, ui-sans-serif, system-ui, sans-serif">no daemon</text>
  </g>

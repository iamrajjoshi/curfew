    </radialGradient>
    <radialGradient id="bgC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(636 374) rotate(180) scale(340 200)">
      <stop stop-color="#6A43A7"/>

  <text x="362" y="236" fill="#CBC8D8" font-size="28" font-weight="500" letter-spacing="-0.4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Protect your quiet hours from risky terminal commands.</text>
  <rect x="362" y="252" width="342" height="3" rx="1.5" fill="url(#accentLine)"/>


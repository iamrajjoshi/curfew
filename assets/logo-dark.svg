    <filter id="shadow" x="40" y="48" width="1120" height="334" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020308" flood-opacity="0.36"/>

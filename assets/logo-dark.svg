<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(214 40) rotate(28) scale(290 220)">
      <stop stop-color="#5133A6"/>
      <stop offset="1" stop-color="#5133A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(976 102) rotate(26) scale(270 220)">
      <stop stop-color="#375BA2"/>
